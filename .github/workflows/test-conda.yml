name: Test (conda)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-conda-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools-scm needs full history

      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: pyjags-test
          python-version: "3.12"
          channels: conda-forge

      - name: Install JAGS and build dependencies from conda-forge
        run: |
          conda install -y jags cmake pkg-config pybind11 numpy \
                           scikit-build-core setuptools-scm \
                           h5py pytest hypothesis pytest-cov
          pip install "arviz>=1.0"

      - name: Build and install pyjags from source
        run: pip install -e . --no-deps --no-build-isolation -v

      - name: Run tests
        run: python -m pytest test/ -v --tb=short

      - name: Verify conda JAGS is used
        run: python -c "import pyjags; print(pyjags.version_info())"

  test-conda-macos:
    runs-on: macos-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: pyjags-test
          python-version: "3.12"
          channels: conda-forge

      - name: Install JAGS and build dependencies from conda-forge
        run: |
          conda install -y jags cmake pkg-config pybind11 numpy \
                           scikit-build-core setuptools-scm \
                           h5py pytest hypothesis pytest-cov
          pip install "arviz>=1.0"

      - name: Build and install pyjags from source
        run: pip install -e . --no-deps --no-build-isolation -v

      - name: Run tests
        run: python -m pytest test/ -v --tb=short

      - name: Verify conda JAGS is used
        run: python -c "import pyjags; print(pyjags.version_info())"
