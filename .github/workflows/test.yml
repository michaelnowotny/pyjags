name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check src/ test/

      - name: Check linting
        run: ruff check src/ test/

  test-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Install JAGS
        run: sudo apt-get update && sudo apt-get install -y jags

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pyjags with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest test/ -v --tb=short

      - name: Run tests with coverage
        run: python -m pytest test/ --cov=pyjags --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          file: coverage.xml
        continue-on-error: true

  test-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Install JAGS
        run: brew install jags

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pyjags with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest test/ -v --tb=short