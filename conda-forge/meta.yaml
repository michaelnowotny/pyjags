{% set name = "pyjags" %}
{% set version = "2.3.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: PLACEHOLDER_SHA256

build:
  number: 0
  skip: true  # [win]
  skip: true  # [py<312]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - {{ compiler('cxx') }}
    - cmake >=3.15
    - pkg-config
  host:
    - python
    - pip
    - scikit-build-core >=0.10
    - pybind11 >=2.12
    - numpy >=2.0
    - setuptools-scm >=8
    - jags >=4.3
  run:
    - python
    - numpy
    - arviz >=1.0
    - h5py
    - jags >=4.3

test:
  imports:
    - pyjags
    - pyjags.console
  requires:
    - pytest
    - hypothesis
  source_files:
    - test/
  commands:
    - python -m pytest test/ -v --tb=short

about:
  home: https://github.com/michaelnowotny/pyjags
  summary: Python interface to JAGS for Bayesian analysis via MCMC
  description: |
    PyJAGS provides a Python interface to JAGS (Just Another Gibbs Sampler),
    a program for analysis of Bayesian hierarchical models using Markov Chain
    Monte Carlo (MCMC) simulation.
  license: GPL-2.0-only
  license_family: GPL
  license_file: LICENSE
  doc_url: https://github.com/michaelnowotny/pyjags
  dev_url: https://github.com/michaelnowotny/pyjags

extra:
  recipe-maintainers:
    - michaelnowotny
